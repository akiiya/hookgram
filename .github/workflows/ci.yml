name: CI

on:
  push:
    branches:
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          rm -f web/node_modules/go.mod 2>/dev/null || true
          npm --prefix web ci
          npm --prefix web run build
          printf 'module hookgram_node_modules\n\ngo 1.26\n' > web/node_modules/go.mod
          touch web/dist/.gitkeep

      - name: Check gofmt
        run: |
          files="$(find cmd internal web -name '*.go' -type f)"
          output="$(gofmt -l $files)"
          if [ -n "$output" ]; then
            echo "$output"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - run: go vet ./...

      - run: go test ./...
        env:
          CGO_ENABLED: "0"

      - name: Scan native SQL calls
        run: |
          if grep -RInE \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=data \
            'db\.Raw|db\.Exec|\.Raw\(|\.Exec\(' cmd internal web; then
            echo "Native SQL call found. Use GORM APIs unless explicitly reviewed."
            exit 1
          fi

      - name: go build
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//')"
          VERSION="${VERSION:-dev}"
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X hookgram/internal/version.Version=${VERSION}" \
            -o dist/hookgram ./cmd/server