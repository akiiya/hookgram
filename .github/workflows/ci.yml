name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Invalid VERSION: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check gofmt
        run: |
          files="$(find cmd internal web -name '*.go' -type f)"
          output="$(gofmt -l $files)"
          if [ -n "$output" ]; then
            echo "$output"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run Go tests
        env:
          CGO_ENABLED: "0"
        run: go test ./...

      - name: Scan native SQL calls
        run: |
          if grep -RInE \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=data \
            'db\.Raw|db\.Exec|\.Raw\(|\.Exec\(' cmd internal web; then
            echo "Native SQL call found. Use GORM APIs unless explicitly reviewed."
            exit 1
          fi

      - name: Build Go binary
        env:
          CGO_ENABLED: "0"
        run: |
          go build -trimpath \
            -ldflags "-s -w -X hookgram/internal/version.Version=$VERSION -X hookgram/internal/version.Commit=${GITHUB_SHA::7} -X hookgram/internal/version.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -o hookgram-ci ./cmd/server

      - name: Minimal startup smoke
        run: |
          export HOOKGRAM_DATA_DIR="${RUNNER_TEMP}/hookgram-data"
          export HOOKGRAM_CONFIG="${HOOKGRAM_DATA_DIR}/config.yaml"
          ./hookgram-ci > "${RUNNER_TEMP}/hookgram.log" 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8787/api/setup/status >/tmp/hookgram-status.json; then
              cat /tmp/hookgram-status.json
              exit 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "${RUNNER_TEMP}/hookgram.log"
              exit 1
            fi
            sleep 0.5
          done
          cat "${RUNNER_TEMP}/hookgram.log"
          exit 1
