name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      commit: ${{ steps.version.outputs.commit }}
      build_date: ${{ steps.version.outputs.build_date }}
    steps:
      - name: Ensure main ref
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow must run from main, got ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          git fetch --tags --force
          version="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Invalid VERSION: $version"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Tag $version already exists. Update VERSION before merging to main."
            exit 1
          fi
          prerelease=false
          if printf '%s' "$version" | grep -q -- '-rc\.'; then
            prerelease=true
          fi
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check gofmt
        run: |
          files="$(find cmd internal web -name '*.go' -type f)"
          output="$(gofmt -l $files)"
          if [ -n "$output" ]; then
            echo "$output"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run Go tests
        env:
          CGO_ENABLED: "0"
        run: go test ./...

      - name: Scan native SQL calls
        run: |
          if grep -RInE \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=data \
            'db\.Raw|db\.Exec|\.Raw\(|\.Exec\(' cmd internal web; then
            echo "Native SQL call found. Use GORM APIs unless explicitly reviewed."
            exit 1
          fi

      - name: Build Go binary
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X hookgram/internal/version.Version=$VERSION -X hookgram/internal/version.Commit=$COMMIT -X hookgram/internal/version.BuildDate=$BUILD_DATE" \
            -o hookgram-release-test ./cmd/server

      - name: Minimal startup smoke
        run: |
          export HOOKGRAM_DATA_DIR="${RUNNER_TEMP}/hookgram-data"
          export HOOKGRAM_CONFIG="${HOOKGRAM_DATA_DIR}/config.yaml"
          ./hookgram-release-test > "${RUNNER_TEMP}/hookgram.log" 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8787/api/setup/status >/tmp/hookgram-status.json; then
              cat /tmp/hookgram-status.json
              curl -fsS http://127.0.0.1:8787/api/version
              exit 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "${RUNNER_TEMP}/hookgram.log"
              exit 1
            fi
            sleep 0.5
          done
          cat "${RUNNER_TEMP}/hookgram.log"
          exit 1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.asset_arch }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            goarm: ""
            asset_arch: amd64
            archive: zip
            ext: .exe
          - goos: windows
            goarch: arm64
            goarm: ""
            asset_arch: arm64
            archive: zip
            ext: .exe
          - goos: linux
            goarch: amd64
            goarm: ""
            asset_arch: amd64
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: arm64
            goarm: ""
            asset_arch: arm64
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: "386"
            goarm: ""
            asset_arch: "386"
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            asset_arch: armv7
            archive: tar.gz
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
          GOOS_VALUE: ${{ matrix.goos }}
          GOARCH_VALUE: ${{ matrix.goarch }}
          GOARM_VALUE: ${{ matrix.goarm }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          ARCHIVE: ${{ matrix.archive }}
          EXT: ${{ matrix.ext }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p package release-assets
          export GOOS="$GOOS_VALUE"
          export GOARCH="$GOARCH_VALUE"
          if [ -n "$GOARM_VALUE" ]; then export GOARM="$GOARM_VALUE"; fi
          go build -trimpath \
            -ldflags "-s -w -X hookgram/internal/version.Version=$VERSION -X hookgram/internal/version.Commit=$COMMIT -X hookgram/internal/version.BuildDate=$BUILD_DATE" \
            -o "package/hookgram${EXT}" ./cmd/server
          cp VERSION README.md RELEASE.md package/
          [ -f LICENSE ] && cp LICENSE package/
          asset="hookgram-${VERSION}-${GOOS_VALUE}-${ASSET_ARCH}"
          if [ "$ARCHIVE" = "zip" ]; then
            (cd package && zip -qr "../release-assets/${asset}.zip" .)
          else
            tar -C package -czf "release-assets/${asset}.tar.gz" .
          fi

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: hookgram-${{ needs.prepare.outputs.version }}-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: release-assets/*

  release:
    name: Create Tag And Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd release-assets
          sha256sum hookgram-*.zip hookgram-*.tar.gz > "hookgram-${VERSION}-checksums.txt"
          cat "hookgram-${VERSION}-checksums.txt"

      - name: Create tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists. Update VERSION before merging to main."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Hookgram ${{ needs.prepare.outputs.version }}
          body_path: RELEASE.md
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: release-assets/*

      - name: Release summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "Published Hookgram ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls -1 release-assets >> "$GITHUB_STEP_SUMMARY"
