name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0-rc.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Invalid version: $version"
            exit 1
          fi
          prerelease=false
          if printf '%s' "$version" | grep -q -- '-rc\.'; then
            prerelease=true
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.asset_arch }}
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            goarm: ""
            asset_arch: amd64
            archive: zip
            ext: .exe
          - goos: windows
            goarch: arm64
            goarm: ""
            asset_arch: arm64
            archive: zip
            ext: .exe
          - goos: linux
            goarch: amd64
            goarm: ""
            asset_arch: amd64
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: arm64
            goarm: ""
            asset_arch: arm64
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: "386"
            goarm: ""
            asset_arch: "386"
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            asset_arch: armv7
            archive: tar.gz
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build package
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          GOOS_VALUE: ${{ matrix.goos }}
          GOARCH_VALUE: ${{ matrix.goarch }}
          GOARM_VALUE: ${{ matrix.goarm }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          ARCHIVE: ${{ matrix.archive }}
          EXT: ${{ matrix.ext }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p package release-assets
          export GOOS="$GOOS_VALUE"
          export GOARCH="$GOARCH_VALUE"
          if [ -n "$GOARM_VALUE" ]; then export GOARM="$GOARM_VALUE"; fi
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          commit="${GITHUB_SHA::7}"
          go build -trimpath \
            -ldflags "-s -w -X hookgram/internal/version.Version=$VERSION -X hookgram/internal/version.Commit=$commit -X hookgram/internal/version.BuildDate=$build_date" \
            -o "package/hookgram${EXT}" ./cmd/server
          cp README.md RELEASE.md package/
          [ -f LICENSE ] && cp LICENSE package/
          asset="hookgram-${VERSION}-${GOOS_VALUE}-${ASSET_ARCH}"
          if [ "$ARCHIVE" = "zip" ]; then
            (cd package && zip -qr "../release-assets/${asset}.zip" .)
          else
            tar -C package -czf "release-assets/${asset}.tar.gz" .
          fi

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: hookgram-${{ needs.resolve.outputs.version }}-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: release-assets/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          cd release-assets
          sha256sum hookgram-* > "hookgram-${VERSION}-checksums.txt"
          cat "hookgram-${VERSION}-checksums.txt"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.version }}
          name: Hookgram ${{ needs.resolve.outputs.version }}
          body_path: RELEASE.md
          prerelease: ${{ needs.resolve.outputs.prerelease }}
          files: release-assets/*
